<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="/css/Cadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="topo">
            <h1>Bem vindo a WaterHouse</h1>
            <h2>Registre-se para continuar</h2>
        </div>
        <div class="cadastrousuario">
            <p>Nome Completo *</p>
            <input type="text" placeholder="Seu nome e sobrenome">
            <p>Data de Nascimento *</p>
            <input type="date" max="2026-03-22">
            <p>E-mail *</p>
            <input type="email" placeholder="seuemail@email.com.br">
            <p>Número de Telefone *</p>
            <input type="number" placeholder="(79) 99999-0000">
            <p>Senha *</p>
            <input type="password" placeholder="Mínimo 6 caracteres">
            <p>Confirmar Senha *</p>
            <input type="password" placeholder="Repita a senha">
        </div>
        <div>
            <button type="submit" class="botaocriarconta">✓ Criar Conta</button>
        </div>
        <div class="linkentar">
            <p>Ja tem conta? <a href="/html/Login.html">Entrar</a></p>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/Cadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="topo">
            <h1>Bem vindo a WaterHouse</h1>
            <h2>Registre-se para continuar</h2>
        </div>

        <form id="formCadastro" class="cadastrousuario">
            <p>Nome Completo *</p>
            <input type="text" id="nome" placeholder="Seu nome e sobrenome">

            <p>Data de Nascimento *</p>
            <input type="date" id="dataNascimento" max="2026-03-22">

            <p>E-mail *</p>
            <input type="email" id="email" placeholder="seuemail@email.com.br">

            <p>Número de Telefone *</p>
            <input type="tel" id="telefone" placeholder="(79) 99999-0000">

            <p>Senha *</p>
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres">

            <p>Confirmar Senha *</p>
            <input type="password" id="confirmarSenha" placeholder="Repita a senha">

            <p id="mensagemErro" class="mensagem-erro"></p>
            <p id="mensagemSucesso" class="mensagem-sucesso"></p>

            <button type="submit" class="botaocriarconta">✓ Criar Conta</button>
        </form>

        <div class="linkentar">
            <p>Ja tem conta? <a href="../html/Login.html">Entrar</a></p>
        </div>
    </div>

    <script src="../js/Cadastro.js"></script>
</body>
</html>

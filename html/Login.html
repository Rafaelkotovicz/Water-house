<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/Login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Login</title>
</head>

<body>
    <div class="container">
       
        <div class="topo">
            <div class="icone-usuario">
                <i class="fa-solid fa-user"></i>
            </div>
            <h1>Seja bem vindo!</h1>
            <h2>Faça login para continuar</h2>
        </div>

        <hr class="separador">

        <div class="fundo">
            <p>Email</p>
            <input type="email" name="username" placeholder="seu@email.com" required>

            <div class="senha-header">
                <p>Senha</p>
                <a href="#">Esqueci senha</a>
            </div>
            <div class="input-senha-wrapper">
                <input type="password" name="password" placeholder="Digite sua senha" required>
            </div>

            <button class="BotaoEntrar" type="submit">Entrar</button>
            <p>Não tem conta? <a href="Cadastro.html">Criar conta gratis!</a></p>

            <div class="divisor">
                <hr><span>ou</span><hr>
            </div>

            <div>
                <h4>Entrar com redes sociais</h4>
                <button class="loginFacebook">
                    <i class="fa-brands fa-facebook"></i> Entrar com Facebook
                </button>
                <button class="loginGoogle">
                    <i class="fa-brands fa-google"></i> Entrar com Google
                </button>
            </div>
        </div>
    </div>

    <script src="../js/Login.js"></script>
</body>

</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../css/Login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="topo">
        <div class="icone-usuario">
          <i class="fa-solid fa-user" style="font-size: 24px"></i>
        </div>
        <h1>Bem-vindo</h1>
        <h2>Faça seu Login</h2>
      </div>

      <hr class="separador" />

      <div class="form-section">
        <p>E-mail</p>
        <input
          type="email"
          id="email"
          placeholder="Digite seu e-mail"
          autofocus
        />

        <div class="senha-header">
          <p>Senha</p>
          <a href="../html/esqueci_senha.html" tabindex="-1"
            >Esqueci minha senha</a
          >
        </div>
        <input type="password" id="senha" placeholder="Digite sua senha" />

        <button type="button" class="BotaoEntrar">Entrar</button>

        <div class="divisor">
          <hr />
          <span>OU</span>
          <hr />
        </div>

        <button type="button" class="loginFacebook">
          <i class="fa-brands fa-facebook"></i> Entrar com Facebook
        </button>
        <button type="button" class="loginGoogle">
          <i class="fa-brands fa-google"></i> Entrar com Google
        </button>
      </div>

      <div class="fundo">
        <p>Não tem uma conta?</p>
        <h4>
          <a
            href="../html/Cadastro.html"
            style="color: #0288d1; text-decoration: none; font-size: 14px"
            >Cadastre-se</a
          >
        </h4>
      </div>
    </div>

    <script src="../js/Login.js"></script>
  </body>
</html>

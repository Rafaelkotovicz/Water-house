<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Senha</title>
    <link rel="stylesheet" href="../css/esqueci_senha.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="topo">
            <div class="icone-usuario">
                <i class="fa-solid fa-lock" style="font-size: 24px;"></i>
            </div>
            <h1>Recuperação</h1>
            <h2>Esqueci a Senha</h2>
        </div>

        <hr class="separador">

        <div class="form-section">
            <p class="instrucao">
                Introduza o seu e-mail e enviaremos um link de recuperação para você redefinir sua senha.
            </p>
            
            <p class="label-input">E-mail</p>
            <input type="email" id="email-recuperacao" placeholder="exemplo@email.com" autofocus>
            
            <button type="button" id="btn-recuperar" class="BotaoEnviar">Enviar Link</button>
        </div>

        <div class="fundo">
            <p>Lembrou-se da senha?</p>
            <h4>
                <a href="Login.html">Voltar ao Login</a>
            </h4>
        </div>
    </div>

    <script src="../js/esqueci_senha.js"></script>
</body>
</html>
